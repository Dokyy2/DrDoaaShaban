<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المساعد الذكي - عيادة دكتورة دعاء شعبان</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --primary-color: #ec4899;
    --accent-color: #f472b6;
    --glass-bg: rgba(255,255,255,0.95);
    --success-color: #059669;
}

*{box-sizing:border-box;}

body{
    margin:0; direction:rtl; font-family:'Cairo';
    background:linear-gradient(-45deg,#fdf2f8,#fbcfe8,#ec4899,#be185d);
    background-size:400% 400%;
    animation:gradientBG 15s ease infinite;
    display:flex; align-items:center; justify-content:center;
    height:100vh; padding:10px;
}

@keyframes gradientBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.chat-container{
    width:100%; max-width:450px; height:95vh;
    background:var(--glass-bg);
    border-radius:30px;
    display:flex; flex-direction:column;
    overflow:hidden;
}

.header{
    padding:15px; text-align:center;
    background:white; font-weight:700;
    color:#be185d;
}

.chat-area{
    flex:1; overflow-y:auto; padding:20px;
    display:flex; flex-direction:column; gap:15px;
}

.msg{
    max-width:85%; padding:14px; border-radius:20px;
}

.bot-msg{background:white;}
.user-msg{background:linear-gradient(135deg,#ec4899,#be185d); color:white;}

.option-btn{
    margin:6px 0; padding:12px;
    border-radius:12px; border:none;
    background:#fdf2f8; cursor:pointer;
    font-family:'Cairo'; width:100%;
}

.input-group{
    display:flex; padding:10px; gap:10px;
    background:white;
}

input{
    flex:1; padding:10px;
    border-radius:12px; border:1px solid #eee;
}

button{
    background:var(--primary-color);
    color:white; border:none;
    border-radius:12px;
    padding:0 15px;
}

.typing{display:flex; gap:4px;}
.dot{width:6px;height:6px;background:#ccc;border-radius:50%;animation:blink 1.4s infinite;}
@keyframes blink{0%,100%{opacity:.3;}50%{opacity:1;}}
</style>
</head>

<body>

<div class="chat-container">
<div class="header">👶 المساعد الذكي - عيادة دكتورة دعاء</div>

<div id="chatArea" class="chat-area"></div>

<div class="input-group">
<input id="userInput" placeholder="مثال: عايزة أحجز ميعاد">
<button onclick="handleSend()">إرسال</button>
</div>
</div>

<script>
const WEB_APP_URL = "PUT_YOUR_SCRIPT_URL";

function addMessage(text,type){
    let div=document.createElement("div");
    div.className="msg "+(type==="user"?"user-msg":"bot-msg");
    div.innerHTML=text;
    chatArea.appendChild(div);
    chatArea.scrollTop=chatArea.scrollHeight;
}

function showTyping(){
    removeTyping();
    let div=document.createElement("div");
    div.id="typing";
    div.className="msg bot-msg typing";
    div.innerHTML='<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    chatArea.appendChild(div);
}

function removeTyping(){
    let t=document.getElementById("typing");
    if(t)t.remove();
}

/* ----------- الحجز ----------- */

function startBooking(){
addMessage(`
اختاري نوع الخدمة 👇
<button class="option-btn" onclick="showForm('كشف أول مرة')">كشف أول مرة</button>
<button class="option-btn" onclick="showForm('متابعة')">متابعة</button>
<button class="option-btn" onclick="showForm('استشارة')">استشارة</button>
`, "bot");
}

function showForm(type){
let tomorrow=new Date();
tomorrow.setDate(tomorrow.getDate()+1);
let min=tomorrow.toISOString().split("T")[0];

addMessage(`
<b>${type}</b><br>
<input id="name" placeholder="الاسم">
<input id="phone" placeholder="رقم الموبايل">
<input id="date" type="date" min="${min}">
<button class="option-btn" onclick="submit('${type}',this)">تأكيد</button>
`,"bot");
}

function submit(type,btn){

let name=document.getElementById("name").value.trim();
let phone=document.getElementById("phone").value.trim();
let date=document.getElementById("date").value;

if(name.length<3){
addMessage("👤 الاسم غير واضح","bot"); return;
}

let clean=phone.replace(/\D/g,"");
if(clean.startsWith("20")) clean="0"+clean.slice(2);

if(!/^01[0-9]{9}$/.test(clean)){
addMessage("📱 رقم غير صحيح","bot"); return;
}

if(!date){
addMessage("📅 اختاري تاريخ","bot"); return;
}

btn.disabled=true;
btn.innerText="جاري الحجز...";

showTyping();

fetch(WEB_APP_URL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name,phone:clean,type,date})
})
.finally(()=>{
removeTyping();
showSummary(name,clean,type,date);
});
}

/* ----------- واتساب ----------- */

function showSummary(name,phone,type,date){

let msg=`حجز جديد%0A${name}%0A${phone}%0A${type}%0A${date}`;
let link=`https://wa.me/201021708011?text=${msg}`;

addMessage(`
📲 راجعي بياناتك 👇<br><br>
👤 ${name}<br>
📅 ${date}<br>
📌 ${type}<br><br>

<button class="option-btn" onclick="window.open('${link}','_blank')">
تأكيد عبر واتساب
</button>
`,"bot");
}

/* ----------- الرسائل ----------- */

function handleSend(){
let input=userInput.value.trim();
if(!input) return;

addMessage(input,"user");
userInput.value="";

showTyping();

setTimeout(()=>{
removeTyping();

if(input.includes("حجز")||input.includes("ميعاد")){
startBooking();
}
else{
addMessage(`
اختاري 👇
<button class="option-btn" onclick="startBooking()">حجز</button>
`,"bot");
}

},600);
}

/* ----------- init ----------- */

window.onload=()=>{
addMessage(`
👋 أهلاً بيكي 🤍<br><br>
<button class="option-btn" onclick="startBooking()">📅 حجز موعد</button>
`,"bot");
};

/* Fix mobile scroll */
window.addEventListener("resize",()=>{
chatArea.scrollTop=chatArea.scrollHeight;
});
</script>

</body>
</html>
