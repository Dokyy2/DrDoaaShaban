<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المساعد الذكي - عيادة دكتورة دعاء شعبان</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #ec4899;
            --dark-pink: #be185d;
            --boy-blue: #2563eb;
            --glass-bg: rgba(255, 255, 255, 0.98);
        }

        * { box-sizing: border-box; }
        body {
            margin: 0; direction: rtl; font-family: 'Cairo', sans-serif;
            background: linear-gradient(-45deg, #fdf2f8, #fbcfe8, #ec4899, #be185d);
            background-size: 400% 400%; animation: gradientBG 15s ease infinite;
            display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden;
        }

        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .chat-container {
            width: 95%; max-width: 450px; height: 95vh;
            background: var(--glass-bg); border-radius: 30px; display: flex; flex-direction: column;
            overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.2);
        }

        .header { padding: 18px; text-align: center; background: white; color: var(--dark-pink); font-weight: 700; border-bottom: 2px solid #fce7f3; }
        .chat-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        
        .msg { max-width: 90%; padding: 14px 18px; border-radius: 20px; font-size: 0.95rem; line-height: 1.6; animation: slideIn 0.4s ease; text-align: center; margin-left: auto; margin-right: auto; }
        .bot-msg { background: white; align-self: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); color: #334155; }
        .user-msg { background: linear-gradient(135deg, #ec4899, #be185d); color: white; align-self: flex-end; border-bottom-left-radius: 4px; text-align: right; }
        
        .success-card { border: 2px solid var(--boy-blue); background: #f0f7ff; color: #1e40af; width: 100%; }

        .option-btn {
            background: white; border: 2px solid #fbcfe8; color: var(--dark-pink); 
            padding: 12px; margin: 6px 0; border-radius: 15px; cursor: pointer; width: 100%; 
            font-weight: 700; font-family: 'Cairo'; transition: 0.3s;
        }
        .option-btn:disabled { background: #f1f5f9 !important; color: #94a3b8 !important; cursor: not-allowed; opacity: 0.7; }

        .flash-red {
            color: #dc2626; font-weight: 800; font-size: 1rem;
            animation: flash 1s infinite; display: block; margin: 10px 0;
        }
        @keyframes flash { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.05); } }

        .booking-form { background: #fffbff; border: 2.5px solid var(--primary-color); border-radius: 25px; padding: 20px; width: 100%; align-self: center; }
        .booking-form input, .booking-form select { width: 100%; margin: 8px 0; padding: 12px; border-radius: 12px; border: 1.5px solid #eee; font-family: 'Cairo'; outline: none; text-align: center; }
        
        .error-hint { color: #e11d48; font-size: 0.8rem; font-weight: 600; display: none; margin-top: -5px; }

        .calc-cloud {
            background: #fdf2f8; border: 2px dashed var(--primary-color);
            border-radius: 30px 30px 5px 30px; padding: 20px; color: #be185d;
            box-shadow: 0 10px 20px rgba(236, 72, 153, 0.1); position: relative;
        }

        .btn-link { display: block; text-decoration: none; padding: 15px; border-radius: 15px; text-align: center; font-weight: 700; margin: 10px 0; }

        .typing { display: flex; gap: 5px; padding: 15px !important; align-self: center; }
        .dot { width: 8px; height: 8px; background: var(--primary-color); border-radius: 50%; animation: blink 1.4s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        @keyframes slideIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        #inputContainer { display: flex; padding: 15px; background: white; border-top: 1px solid #fce7f3; }
        #userInput { flex: 1; padding: 12px; border-radius: 15px; border: 1px solid #eee; font-family: 'Cairo'; outline: none; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">👶 المساعد الذكي - عيادة دكتورة دعاء</div>
    <div id="chatArea" class="chat-area"></div>
    <div class="input-group" id="inputContainer">
        <input id="userInput" placeholder="اكتبي سؤالك هنا...">
        <button id="sendBtn" onclick="handleSend()" style="background:var(--primary-color); color:white; border:none; padding:0 20px; border-radius:15px; font-weight:700; cursor:pointer;">إرسال</button>
    </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzVLG7Efe1SQH0rsLZYgALO3n1h8ZsyDMUPOTDt48dZEOy8PM_Eh4wNJdy2drHsORC4/exec";

function getWelcomeMessage() {
    return `👋 <b style="color:var(--dark-pink); font-size:1.1rem;">أهلاً بكِ في عيادتنا</b><br><br>
    أنا <span style="color:var(--primary-color); font-weight:700;">مساعدك الذكي</span>، موجود هنا علشان أسهّل عليكِ الحجز والاستفسارات 🤍<br><br>
    ✨ <b>اختاري كيف يمكنني مساعدتك:</b><br>
    <button class="option-btn main-opt" onclick="showBookingOptions(this)">📅 حجز ميعاد جديد</button>
    <button class="option-btn main-opt" onclick="quickSend('حاسبة الحمل')">🤰 احسبي عمر حملك</button>
    <button class="option-btn main-opt" onclick="quickSend('عن المساعد الذكي')">✨ عن المساعد الذكي</button>`;
}

function showBookingOptions(btn) {
    disableSameLevelButtons('main-opt', btn);
    showTyping();
    setTimeout(() => {
        removeTyping();
        const msg = `📋 <b style="color:var(--dark-pink);">من فضلك اختاري نوع الكشف:</b><br>
        <button class="option-btn sub-opt" onclick="renderForm('first', this)">💖 كشف نساء أول مرة</button>
        <button class="option-btn sub-opt" onclick="renderForm('follow', this)">🔄 كشف نساء متابعة</button>
        <button class="option-btn sub-opt" onclick="renderForm('consult', this)">📝 استشارة مريضة</button>
        <button class="option-btn sub-opt" onclick="renderForm('birth', this)">👶 حجز ولادة</button>`;
        addMessage(msg, "bot");
    }, 800);
}

function renderForm(type, btn) {
    disableSameLevelButtons('sub-opt', btn);
    const minDate = new Date();
    minDate.setDate(minDate.getDate() + 1);
    const minDateStr = minDate.toISOString().split('T')[0];

    showTyping();
    setTimeout(() => {
        removeTyping();
        let fields = "";
        if (type === 'first') {
            fields = `<b>📋 بيانات حجز كشف أول مرة</b>
                <input type="text" id="pName" placeholder="👤 الاسم الثلاثي بالكامل" oninput="checkName(this)">
                <div id="nameErr" class="error-hint">⚠️ يرجى كتابة الاسم ثلاثي على الأقل</div>
                
                <input type="tel" id="pPhone" placeholder="📱 موبايل (يفضل واتساب)" maxlength="11" oninput="checkPhone(this)">
                <div id="phoneErr" class="error-hint">⚠️ يرجى التأكد من الموبايل (11 رقم)</div>

                <p style="font-size:0.8rem; margin:5px 0; color:#666;">📅 تاريخ الحجز:</p>
                <input type="date" id="pDate" min="${minDateStr}">
                
                <select id="pSource" onchange="toggleOtherSource(this.value)">
                    <option value="">✨ عرفتينا منين؟</option>
                    <option value="فيسبوك">🔵 فيسبوك</option>
                    <option value="تيك توك">⚫ تيك توك</option>
                    <option value="صديق">👭 ترشيح صديق</option>
                    <option value="إعلان ممول">📢 إعلان ممول</option>
                    <option value="أخرى">🔍 جهة أخرى</option>
                </select>
                <div id="otherSourceArea"></div>
                <button class="option-btn" style="background:var(--primary-color); color:white; border:none;" onclick="validateAndSubmit('كشف أول مرة')">تأكيد الحجز الآن ✅</button>`;
        }
        addMessage(`<div class="booking-form" id="activeForm">${fields}</div>`, "bot");
    }, 600);
}

function checkName(el) { document.getElementById("nameErr").style.display = el.value.trim().split(" ").length < 3 ? "block" : "none"; }
function checkPhone(el) { document.getElementById("phoneErr").style.display = el.value.length < 11 ? "block" : "none"; }

function toggleOtherSource(val) {
    const area = document.getElementById("otherSourceArea");
    area.innerHTML = val === 'أخرى' ? `<input type="text" id="pOtherSource" placeholder="اكتبي المصدر هنا...">` : "";
}

function validateAndSubmit(bookingType) {
    const name = document.getElementById("pName").value;
    const phone = document.getElementById("pPhone").value;
    const date = document.getElementById("pDate").value;
    const sourceBase = document.getElementById("pSource").value;
    const otherSource = document.getElementById("pOtherSource") ? document.getElementById("pOtherSource").value : "";
    const source = sourceBase === 'أخرى' ? otherSource : sourceBase;

    // نظام التنبيه الذكي بالترتيب
    if (name.trim().split(" ").length < 3) { alert("أنتِ نسيتِ كتابة الاسم ثلاثي 👤"); return; }
    if (phone.length < 11) { alert("أنتِ نسيتِ إكمال رقم التليفون (11 رقم) 📱"); return; }
    if (!date) { alert("أنتِ نسيتِ اختيار تاريخ الحجز 📅"); return; }
    if (!source) { alert("أنتِ نسيتِ إخبارنا عرفتينا منين ✨"); return; }

    document.getElementById("activeForm").style.opacity = "0.5";
    document.getElementById("activeForm").style.pointerEvents = "none";
    showTyping();

    const payload = { name, phone, date, source, type: bookingType };

    fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) })
    .then(() => {
        setTimeout(() => {
            removeTyping();
            finishProcess(payload);
        }, 1500);
    });
}

function finishProcess(data) {
    // تنسيق الواتساب المطلوب بالضبط
    const waMsg = `*قسم الحجوزات المسبقة*%0A------------------%0Aالاسم: *${data.name}*%0Aالهاتف: ${data.phone}%0Aالنوع: ${data.type}%0Aتاريخ الحجز: *${data.date}*`;
    const waUrl = `https://wa.me/201125337717?text=${waMsg}`;

    addMessage(`<div class="msg bot-msg success-card">🎉 <b>تم تسجيل طلبك بنجاح</b><br><br>📞 فريق العيادة هيتواصل معاكِ خلال وقت قصير لتأكيد الميعاد المناسب.<br>🩺 وهنكون معاكِ خطوة بخطوة لحد ما تتم الزيارة بأفضل شكل.</div>`, "bot");

    const flashMsg = `<span class="flash-red">⚠️ خطوة هامة جداً:</span>
    اضغطي على الزر بالأسفل لإرسال بياناتك للعيادة فوراً لضمان سرعة الرد والتأكيد 👇`;
    addMessage(flashMsg, "bot");

    addMessage(`<a href="${waUrl}" target="_blank" class="btn-link" style="background:#25D366; color:white;">💬 إرسال البيانات وتأكيد الحجز الآن</a>`, "bot");

    setTimeout(() => {
        addMessage(`هل تودين حجز ميعاد آخر أو حساب الحمل؟<br><button class="option-btn" onclick="location.reload()">🔄 حجز جديد / حساب الحمل</button>`, "bot");
    }, 2500);
}

function calculatePregnancy() {
    addMessage(`<div class="booking-form calc-cloud"><b>🤰 حاسبة عمر الحمل 👶</b><br>ادخلي تاريخ أول يوم لآخر دورة شهرية:<input type="date" id="lastPeriod"><button class="option-btn" onclick="doCalc()">احسبي الآن ✨</button></div>`, "bot");
}

function doCalc() {
    const d = document.getElementById("lastPeriod").value; if(!d) return;
    const diff = new Date() - new Date(d);
    const totalDays = Math.floor(diff / (1000 * 60 * 60 * 24));
    const weeks = Math.floor(totalDays / 7);
    const days = totalDays % 7;
    const months = Math.floor(weeks / 4);

    const res = `✨ أنتِ الآن في:<br><b style="font-size:1.1rem; color:var(--dark-pink);">${weeks} أسبوع و ${days} يوم</b><br>يعني تقريباً في <b style="color:var(--boy-blue);">الشهر ${months + 1}</b> 👶<br>ربنا يتمم لك على خير ويرزقك طفل سليم 🤍`;
    addMessage(`<div class="calc-cloud">${res}</div>`, "bot");
}

function aboutAssistant() {
    addMessage(`<div class="msg bot-msg" style="border:2px solid var(--boy-blue); color:var(--boy-blue); font-weight:700;">✨ عن المساعد الذكي</div>`, "bot");
    setTimeout(() => {
        addMessage(`أنا مساعدك الرقمي لعيادة دكتورة دعاء شعبان، تم تطويري لتسهيل الحجز والاستعلام على مدار 24 ساعة لضمان راحتك 🤍`, "bot");
    }, 500);
}

function disableSameLevelButtons(className, clickedBtn) {
    const btns = document.getElementsByClassName(className);
    for (let b of btns) { b.disabled = true; if (b === clickedBtn) { b.style.background = "#be185d"; b.style.color = "white"; } }
}

function addMessage(text, type) {
    let chat = document.getElementById("chatArea");
    let div = document.createElement("div");
    div.className = "msg " + (type === "user" ? "user-msg" : "bot-msg");
    div.innerHTML = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
    let div = document.createElement("div"); div.id = "typing"; div.className = "msg bot-msg typing";
    div.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    document.getElementById("chatArea").appendChild(div);
    document.getElementById("chatArea").scrollTop = document.getElementById("chatArea").scrollHeight;
}

function removeTyping() { const t = document.getElementById("typing"); if (t) t.remove(); }

function quickSend(text) {
    addMessage(text, "user");
    if (text.includes('حجز')) showBookingOptions();
    if (text.includes('حمل')) calculatePregnancy();
    if (text.includes('المساعد')) aboutAssistant();
}

window.onload = () => { showTyping(); setTimeout(() => { removeTyping(); addMessage(getWelcomeMessage(), "bot"); }, 1000); };
function handleSend() {
    const i = document.getElementById("userInput"); if(!i.value) return;
    addMessage(i.value, "user"); i.value = "";
    addMessage("من فضلك استخدمي الأزرار المتاحة لتسهيل الحجز 🌸", "bot");
}
</script>
</body>
</html>
